<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero – Dark Forest Misty Morning</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(1.5rem);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .anim-fade-in-up {
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards;
    }

    .delay-200 {
      animation-delay: 0.2s;
    }

    .delay-400 {
      animation-delay: 0.4s;
    }

    @keyframes drawUnderline {
      from {
        stroke-dashoffset: 220;
      }

      to {
        stroke-dashoffset: 0;
      }
    }

    .underline-path {
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      animation: drawUnderline 0.7s ease 1s forwards;
    }

    .video-mask {
      -webkit-mask-image: linear-gradient(to bottom, white 50%, transparent 99%);
      mask-image: linear-gradient(to bottom, white 50%, transparent 99%);
    }
  </style>
</head>

<body class="m-0 overflow-hidden bg-black" style="height: 100dvh;">

  <div class="flex h-full items-center justify-center p-2 md:p-4">
    <div class="relative h-full w-full overflow-hidden rounded-[2rem]">
      <video autoplay loop muted playsinline
        class="video-mask absolute inset-0 h-full w-full object-cover object-bottom pointer-events-none">
        <source src="./video.mp4" type="video/mp4" />
        Your browser does not support HTML video.
      </video>

      <div class="absolute inset-0 pointer-events-none opacity-25"
        style="background: linear-gradient(130deg, transparent 40%, transparent 50%, #319197 76.05%); mix-blend-mode: screen;">
      </div>

      <nav class="absolute inset-x-0 top-0 z-30 flex items-center justify-between px-6 py-6 md:px-12">
        <a href="/" class="text-xl font-bold tracking-tighter text-white">
          openheros
        </a>

        <div class="hidden items-center gap-8 text-sm font-medium text-white/70 md:flex border border-white/20 rounded-full bg-white/10 px-8 py-4">
          <a href="#" class="transition-colors hover:text-white">Gallery</a>
          <a href="#" class="transition-colors hover:text-white">Docs</a>
          <a href="https://github.com/cristianolivera1/openmotion" target="_blank" class="transition-colors hover:text-white">GitHub</a>
        </div>

        <a href="#"
          class="rounded-lg bg-white px-4 py-2 text-sm font-semibold text-black transition-colors hover:bg-white/90">
          Get Started
        </a>
      </nav>

      <div
        class="absolute inset-x-0 bottom-0 z-20 flex flex-col justify-between gap-8 p-6 md:p-12 lg:flex-row lg:items-end">

        <div class="anim-fade-in-up delay-200 max-w-3xl">
          <h1 class="mb-6 font-sans text-5xl font-medium leading-[1.1] text-white md:text-7xl">
            Pushing talent<br />
            <span class="text-white/90">to new heights.</span>
          </h1>
        </div>

        <div
          class="anim-fade-in-up delay-400 flex w-full flex-col items-start gap-6 border-t border-white/10 pt-6 sm:flex-row sm:items-center lg:w-auto lg:border-l lg:border-t-0 lg:pl-12 lg:pt-0">
          <p class="max-w-sm text-lg font-light text-white/80">
            Build your project and show your talent in
            <span class="relative ml-1 inline-block whitespace-nowrap text-white">
              3 weeks.
              <svg viewBox="0 0 187 10" fill="none" xmlns="http://www.w3.org/2000/svg"
                class="absolute bottom-0.5 left-0 w-full pointer-events-none text-accent" preserveAspectRatio="none">
                <path d="M2 7.85498C2 7.85498 63 2.81649 112 1.97674C161 1.137 185.5 4.91586 185.5 4.91586"
                  stroke="#FFD45E" stroke-width="3" stroke-linecap="round" />
              </svg>

            </span>
          </p>
        </div>

      </div>
    </div>
  </div>

</body>

</html>
